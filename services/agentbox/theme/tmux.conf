# Agentbox tmux config — Tokyo Night theme (matches Jon's dotfiles)
# Simplified for containers: no TPM plugins, just colors and keybinds

# General settings
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 10
set -g history-limit 50000
set -g set-clipboard on
set -g detach-on-destroy off

# Move status bar to top
set -g status-position top

# Enable mouse support
set -g mouse on

# Vim keybinds
setw -g mode-keys vi

# Terminal
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ── Tokyo Night theme (inline, no TPM) ──────────────────────────

# Colors
TN_BG="#1a1b26"
TN_FG="#a9b1d6"
TN_BLACK="#15161e"
TN_BLUE="#7aa2f7"
TN_CYAN="#7dcfff"
TN_GREEN="#9ece6a"
TN_MAGENTA="#bb9af7"
TN_RED="#f7768e"
TN_YELLOW="#e0af68"
TN_COMMENT="#565f89"
TN_GUTTER="#292e42"

# Status bar
set -g status-style "bg=$TN_BG,fg=$TN_FG"
set -g status-left-length 40
set -g status-right-length 40
set -g status-left "#[fg=$TN_BLACK,bg=$TN_BLUE,bold]  #S #[fg=$TN_BLUE,bg=$TN_BG,nobold] "
set -g status-right "#[fg=$TN_COMMENT] %H:%M "

# Window status
setw -g window-status-format "#[fg=$TN_COMMENT,bg=$TN_BG] #I:#W "
setw -g window-status-current-format "#[fg=$TN_BG,bg=$TN_BLUE,bold] #I:#W #[fg=$TN_BLUE,bg=$TN_BG,nobold]"

# Pane borders
set -g pane-border-style "fg=$TN_GUTTER"
set -g pane-active-border-style "fg=$TN_BLUE"

# Message style
set -g message-style "bg=$TN_BG,fg=$TN_CYAN"
set -g message-command-style "bg=$TN_BG,fg=$TN_CYAN"
