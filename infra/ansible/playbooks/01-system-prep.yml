---
# System Preparation
# Core utilities, deploy user, directories

- name: Install core utilities
  dnf:
    name:
      - git
      - jq
      - tmux
      - vim
      - wget
      - tar
    state: present

- name: Create deploy user
  user:
    name: "{{ deploy_user }}"
    groups: wheel
    append: yes
    shell: /bin/bash
    create_home: yes
    home: "{{ deploy_home }}"
    state: present

- name: Create .ssh directory for deploy user
  file:
    path: "{{ deploy_home }}/.ssh"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0700'

- name: Copy authorized_keys from root to deploy user
  copy:
    src: /root/.ssh/authorized_keys
    dest: "{{ deploy_home }}/.ssh/authorized_keys"
    remote_src: yes
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0600'
  ignore_errors: yes

- name: Grant sudo privileges to deploy user
  lineinfile:
    path: /etc/sudoers.d/{{ deploy_user }}
    line: "{{ deploy_user }} ALL=(ALL) NOPASSWD:ALL"
    create: yes
    validate: 'visudo -cf %s'
    mode: '0440'

- name: Create application directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0755'
  loop:
    - "{{ app_directory }}"
    - "{{ app_directory }}/backups"
    - "{{ app_directory }}/agentbox-configs"
    - "{{ deploy_home }}"

- name: Clone Hill90 application repository
  git:
    repo: https://github.com/jonhill90/Hill90.git
    dest: "{{ app_directory }}/app"
    version: main
    force: yes
  become_user: "{{ deploy_user }}"

- name: Configure daily backup cron
  cron:
    name: "hill90-daily-backup"
    user: "{{ deploy_user }}"
    hour: "3"
    minute: "0"
    job: "cd {{ app_directory }}/app && SOPS_AGE_KEY_FILE={{ app_directory }}/secrets/keys/keys.txt bash scripts/backup.sh backup-all >> {{ app_directory }}/backups/cron.log 2>&1"

- name: Configure weekly backup prune cron
  cron:
    name: "hill90-backup-prune"
    user: "{{ deploy_user }}"
    weekday: "0"
    hour: "4"
    minute: "0"
    job: "cd {{ app_directory }}/app && bash scripts/backup.sh prune 7 >> {{ app_directory }}/backups/cron.log 2>&1"
