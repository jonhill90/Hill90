      description: |
        Removes a skill assignment from an agent. Agent must be stopped.
        RBAC on scope: container_local — any user (own agents). host_docker/vps_system — admin only.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Skill removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  removed:
                    type: boolean
        "401":
          description: Not authenticated
        "403":
          description: Elevated scope requires admin role
        "404":
          description: Agent, skill, or assignment not found
        "409":
          description: Agent is running

  # ── Chat Lane (Phase 1: direct threads) ──

  /chat/threads:
    get:
      summary: List chat threads
      description: |
        Lists threads the caller participates in. Admin sees all threads.
        Returns last message preview (truncated to 100 chars).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Thread list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    type:
                      type: string
                      enum: [direct, group]
                    title:
                      type: string
                      nullable: true
                    created_by:
                      type: string
                    last_message:
                      type: string
                      nullable: true
                    last_author_type:
                      type: string
                      nullable: true
                    created_at:
                      type: string
                      format: date-time
                    updated_at:
                      type: string
                      format: date-time
        "401":
          description: Not authenticated

    post:
      summary: Create thread
      description: |
        Creates a new thread and sends the first message. Supports both direct
        (single agent_id) and group (agent_ids array) creation. For group threads,
        dispatches to all running agents and returns three-array response
        (dispatched/skipped/failed). Max 8 agents per group.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agent_id:
                  type: string
                  format: uuid
                  description: Single agent UUID (creates direct thread)
                agent_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Multiple agent UUIDs (creates group thread)
                  maxItems: 8
                message:
                  type: string
                title:
                  type: string
                  nullable: true
                idempotency_key:
                  type: string
                  nullable: true
              required: [message]
      responses:
        "201":
          description: Thread created and message dispatched
          content:
            application/json:
              schema:
                type: object
                properties:
                  thread:
                    type: object
                  message_id:
                    type: string
                    format: uuid
                    description: Placeholder ID (direct thread)
                  user_message:
                    type: object
                    description: User message info (group thread)
                  dispatched:
                    type: array
                    description: Agents dispatched (group thread)
                  skipped:
                    type: array
                    description: Agents skipped (group thread)
                  failed:
                    type: array
                    description: Agents failed (group thread)
        "400":
          description: Missing or invalid fields, or exceeds max agents
        "403":
          description: Elevated scope requires admin role
        "404":
          description: Agent not found
        "409":
          description: Agent not running or duplicate idempotency key

  /chat/threads/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Get thread detail with messages
      description: |
        Returns thread metadata, participants, and all messages.
        Requires participant membership or admin role.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Thread with messages
        "404":
          description: Thread not found or not a participant

    put:
      summary: Update thread title
      description: Requires thread owner or admin role.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Thread updated
        "404":
          description: Thread not found or not owner

    delete:
      summary: Delete thread
      description: Deletes thread and cascades to messages and participants.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Thread deleted
        "404":
          description: Thread not found or not owner

  /chat/threads/{id}/messages:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    post:
      summary: Send message in thread
      description: |
        Sends a user message and dispatches work to the agent.
        Pre-checks: agent running, concurrency guard, elevated scope check.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                idempotency_key:
                  type: string
                  nullable: true
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message_id:
                    type: string
                    format: uuid
        "400":
          description: Missing or invalid fields
        "403":
          description: Elevated scope requires admin role
        "404":
          description: Thread not found or not a participant
        "409":
          description: Agent not running, concurrency guard, or duplicate

  /chat/threads/{id}/participants:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    put:
      summary: Add or remove agent participants
      description: |
        Add or remove agent participants from a group thread. Only the thread owner
        or admin can modify participants. Removing an agent sets left_at and marks
        any pending messages from that agent as error.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                add:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Agent UUIDs to add
                remove:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Agent UUIDs to remove
      responses:
        "200":
          description: Updated participant list
          content:
            application/json:
              schema:
                type: object
                properties:
                  participants:
                    type: array
                    items:
                      type: object
        "400":
          description: Exceeds max agents per group
        "403":
          description: Elevated scope requires admin role
        "404":
          description: Thread not found or not owner

  /chat/threads/{id}/cancel:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    post:
      summary: Cancel all pending messages
      description: |
        Marks all pending messages in the thread as error with message
        'Cancelled by user'. Bumps seq for SSE visibility.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cancellation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  cancelled:
                    type: integer
                    description: Number of messages cancelled
        "404":
          description: Thread not found or not a participant

  /chat/threads/{id}/stream:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: SSE message stream
      description: |
        Server-Sent Events stream with DB-backed cursor replay via Last-Event-ID.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
        "404":
          description: Thread not found or not a participant

  /chat/threads/{id}/events:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Thread-scoped agent event stream
      description: |
        Server-side validated, correlation-filtered event stream for all running
        agents in the thread. Validates participant membership, resolves active
        agents, proxies their event streams, and filters to events whose
        correlation_id matches a message_id in this thread. Returns SSE when
        follow=true, JSON array otherwise.
      security:
        - bearerAuth: []
      parameters:
        - name: follow
          in: query
          schema:
            type: string
            enum: ["true"]
          description: Enable SSE streaming mode
        - name: tail
          in: query
          schema:
            type: integer
            default: 20
          description: Number of historical events to include
      responses:
        "200":
          description: Event stream (SSE) or event array (JSON)
        "404":
          description: Thread not found or not a participant
        "409":
          description: No running agents in thread

  # Task management
  /tasks:
    get:
      summary: List tasks
      tags: [Tasks]
      security:
        - bearerAuth: []
      parameters:
        - name: agent_id
          in: query
          schema:
            type: string
          description: Optional agent ID filter
        - name: status
          in: query
          schema:
            type: string
            enum: [backlog, todo, in_progress, review, done, cancelled]
          description: Optional status filter
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentTask'
    post:
      summary: Create task
      tags: [Tasks]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent_id, title]
              properties:
                agent_id:
                  type: string
                title:
                  type: string
                description:
                  type: string
                status:
                  type: string
                  enum: [backlog, todo, in_progress, review, done, cancelled]
                priority:
                  type: integer
                  minimum: 1
                  maximum: 4
                tags:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Created task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentTask'

  /tasks/{id}:
    get:
      summary: Get task
      tags: [Tasks]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Task detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentTask'
        "404":
          description: Task not found
    put:
      summary: Update task
      tags: [Tasks]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                status:
                  type: string
                  enum: [backlog, todo, in_progress, review, done, cancelled]
                priority:
                  type: integer
                  minimum: 1
                  maximum: 4
                tags:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Updated task
        "404":
          description: Task not found
    delete:
      summary: Cancel task
      tags: [Tasks]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Cancelled task
        "404":
          description: Task not found

  /tasks/{id}/transition:
    patch:
      summary: Transition task status
      tags: [Tasks]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [backlog, todo, in_progress, review, done, cancelled]
      responses:
        "200":
          description: Transitioned task
        "404":
          description: Task not found
