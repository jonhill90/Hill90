          type: string
          format: uuid

    post:
      summary: Assign skill to agent
      description: |
        Assigns a skill from the catalog to an agent. Agent must be stopped.
        RBAC on scope: container_local — any user (own agents). host_docker/vps_system — admin only.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
