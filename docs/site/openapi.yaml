          description: Skill assigned
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_id:
                    type: string
                    format: uuid
                  skill_id:
                    type: string
                    format: uuid
                  assigned_at:
                    type: string
                    format: date-time
                  assigned_by:
                    type: string
        "400":
