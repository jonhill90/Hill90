openapi: 3.0.3
info:
  title: Hill90 API
  description: Hill90 platform API — agent management and lifecycle operations.
  version: 0.1.0

servers:
  - url: /
    description: Relative (behind Traefik reverse proxy)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Agent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agent_id:
          type: string
          description: Unique slug identifier (lowercase, alphanumeric, hyphens)
          pattern: "^[a-z0-9][a-z0-9-]{0,61}[a-z0-9]$"
        name:
          type: string
        description:
          type: string
        tools_config:
          type: object
        cpus:
          type: string
          default: "1.0"
        mem_limit:
          type: string
          default: "1g"
        pids_limit:
          type: integer
          default: 200
        soul_md:
          type: string
        rules_md:
          type: string
        status:
          type: string
          enum: [stopped, running, error]
        container_id:
          type: string
          nullable: true
        model_policy_id:
          type: string
          format: uuid
          nullable: true
          description: ID of the model policy controlling LLM access for this agent
        error_message:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        created_by:
          type: string

    AgentStatus:
      type: object
      properties:
        db_status:
          type: string
        container:
          type: object
          nullable: true
        error_message:
          type: string
          nullable: true

    UserProfile:
      type: object
      properties:
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        emailVerified:
          type: boolean
        hasAvatar:
          type: boolean

    KnowledgeEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agent_id:
          type: string
        path:
          type: string
        title:
          type: string
        entry_type:
          type: string
          enum: [note, plan, decision, journal, research]
        content:
          type: string
          description: Full markdown content (only included in single-entry reads)
        content_hash:
          type: string
        tags:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, archived]
        sync_status:
          type: string
          enum: [pending, synced, quarantined]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    KnowledgeAgent:
      type: object
      properties:
        agent_id:
          type: string
        entry_count:
          type: integer
        last_updated:
          type: string
          format: date-time

    KnowledgeSearchResult:
      type: object
      properties:
        query:
          type: string
        results:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              agent_id:
                type: string
              path:
                type: string
              title:
                type: string
              entry_type:
                type: string
              tags:
                type: array
                items:
                  type: string
              score:
                type: number
              headline:
                type: string
                description: Search result snippet with highlights
              created_at:
                type: string
                format: date-time
              updated_at:
                type: string
                format: date-time
        count:
          type: integer
        search_type:
          type: string
          example: fts
        score_type:
          type: string
          example: ts_rank

    Error:
      type: object
      properties:
        error:
          type: string

    Message:
      type: object
      properties:
        message:
          type: string

paths:
  /health:
    get:
      summary: Health check
      description: Returns service health status. Public — no authentication required.
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  service:
                    type: string
                    example: api

  /me:
    get:
      summary: Get current user claims
      description: Returns the JWT claims of the authenticated user.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: JWT claims
          content:
            application/json:
              schema:
                type: object
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /agents:
    get:
      summary: List agents
      description: Returns agents scoped to the authenticated user (all agents for admin).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Agent list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"
        "401":
          description: Not authenticated
        "403":
          description: Requires user role

    post:
      summary: Create agent
      description: Creates a new agent definition.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - agent_id
                - name
              properties:
                agent_id:
                  type: string
                  pattern: "^[a-z0-9][a-z0-9-]{0,61}[a-z0-9]$"
                name:
                  type: string
                description:
                  type: string
                tools_config:
                  type: object
                cpus:
                  type: string
                mem_limit:
                  type: string
                pids_limit:
                  type: integer
                soul_md:
                  type: string
                rules_md:
                  type: string
                model_policy_id:
                  type: string
                  format: uuid
                  description: ID of the model policy for LLM access
      responses:
        "201":
          description: Agent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "400":
          description: Invalid input
        "401":
          description: Not authenticated
        "403":
          description: Requires user role
        "409":
          description: Duplicate agent_id

  /agents/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Get agent detail
      description: Returns a single agent, scoped to ownership.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Agent detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "401":
          description: Not authenticated
        "403":
          description: Requires user role
        "404":
          description: Agent not found

    put:
      summary: Update agent
      description: Updates agent configuration. Agent must be stopped.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                tools_config:
                  type: object
                cpus:
                  type: string
                mem_limit:
                  type: string
                pids_limit:
                  type: integer
                soul_md:
                  type: string
                rules_md:
                  type: string
                model_policy_id:
                  type: string
                  format: uuid
                  description: ID of the model policy for LLM access
      responses:
        "200":
          description: Agent updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "401":
          description: Not authenticated
        "403":
          description: Requires user role
        "404":
          description: Agent not found
        "409":
          description: Agent is running

    delete:
      summary: Delete agent
      description: Deletes an agent. Requires admin role. Optionally purges volumes.
      security:
        - bearerAuth: []
      parameters:
        - name: purge
          in: query
          schema:
            type: string
            enum: ["true", "false"]
          description: If "true", also remove agent volumes
      responses:
        "200":
          description: Agent deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
        "401":
          description: Not authenticated
        "403":
          description: Requires admin role
        "404":
          description: Agent not found

  /agents/{id}/start:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Start agent
      description: Creates and starts the agent container. Requires admin role.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Agent started
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: running
                  container_id:
                    type: string
        "401":
          description: Not authenticated
        "403":
          description: Requires admin role
        "404":
          description: Agent not found
        "503":
          description: AGENTBOX_CONFIG_HOST_PATH not configured

  /agents/{id}/stop:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Stop agent
      description: Stops and removes the agent container. Requires admin role.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Agent stopped
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: stopped
        "401":
          description: Not authenticated
        "403":
          description: Requires admin role
        "404":
          description: Agent not found

  /agents/{id}/status:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get agent status
      description: Returns agent status from DB and live container inspection. Scoped to ownership.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Agent status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentStatus"
        "401":
          description: Not authenticated
        "403":
          description: Requires user role
        "404":
          description: Agent not found

  /agents/{id}/logs:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get agent logs
      description: >
        Returns container logs. Requires admin role.
        With follow=true, returns an SSE stream (text/event-stream).
        Without follow, returns JSON with log text.
      security:
        - bearerAuth: []
      parameters:
        - name: tail
          in: query
          schema:
            type: integer
            default: 200
          description: Number of tail lines
        - name: follow
          in: query
          schema:
            type: string
            enum: ["true", "false"]
          description: If "true", stream logs via SSE
      responses:
        "200":
          description: Log output (JSON or SSE stream)
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: string
            text/event-stream:
              schema:
                type: string
        "401":
          description: Not authenticated
        "403":
          description: Requires admin role
        "404":
          description: Agent not found

  /profile:
    get:
      summary: Get user profile
      description: Returns the authenticated user's Keycloak profile and avatar status.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Not authenticated
        "403":
          description: Requires user role

    patch:
      summary: Update display name
      description: Updates firstName and/or lastName via Keycloak Account API.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                  maxLength: 100
                lastName:
                  type: string
                  maxLength: 100
      responses:
        "200":
          description: Updated name
          content:
            application/json:
              schema:
                type: object
                properties:
                  firstName:
                    type: string
                  lastName:
                    type: string
        "400":
          description: Invalid input
        "401":
          description: Not authenticated
        "403":
          description: Requires user role

  /profile/avatar:
    post:
      summary: Upload avatar
      description: Upload or replace avatar image. Resized to 256x256 WebP.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - avatar
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        "200":
          description: Avatar uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          description: Invalid file
        "401":
          description: Not authenticated
        "403":
          description: Requires user role

    delete:
      summary: Delete avatar
      description: Removes the user's avatar from S3 and clears the DB reference.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Avatar deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          description: Not authenticated
        "403":
          description: Requires user role
        "404":
          description: No avatar found

    get:
      summary: Get avatar image
      description: Streams the user's avatar as image/webp. Supports ETag/If-None-Match.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Avatar image
          content:
            image/webp:
              schema:
                type: string
                format: binary
        "304":
          description: Not modified
        "401":
          description: Not authenticated
        "403":
          description: Requires user role
        "404":
          description: No avatar found

  /profile/password:
    post:
      summary: Change password
      description: >
        Password change endpoint. Currently returns 501 because Keycloak 12+ removed
        the /account/credentials/password REST endpoint. A browser-based flow via
        kc_action=UPDATE_PASSWORD will be implemented in a future PR.
      security:
        - bearerAuth: []
      responses:
        "501":
          description: Not yet implemented
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Password change not yet available
                  code:
                    type: string
                    example: NOT_IMPLEMENTED
        "401":
          description: Not authenticated
        "403":
          description: Requires user role

  /knowledge/agents:
    get:
      summary: List agents with knowledge
      description: >
        Returns agents that have knowledge entries, with entry counts and last updated
        timestamps. Scoped to ownership — users see their own agents, admins see all.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Agent knowledge stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeAgent"
        "401":
          description: Not authenticated
        "403":
          description: Requires user role

  /knowledge/entries:
    get:
      summary: List knowledge entries
      description: >
        Returns knowledge entries for a specific agent. Requires agent_id query parameter.
        Users can only list entries for agents they own. Admins can list any agent's entries.
      security:
        - bearerAuth: []
      parameters:
        - name: agent_id
          in: query
          required: true
          schema:
            type: string
          description: Agent ID to list entries for
        - name: type
          in: query
          schema:
            type: string
            enum: [note, plan, decision, journal, research]
          description: Optional entry type filter
      responses:
        "200":
          description: Entry list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeEntry"
        "400":
          description: Missing agent_id parameter
        "401":
          description: Not authenticated
        "403":
          description: Not authorized to view this agent's knowledge

  /knowledge/entries/{agentId}/{path}:
    parameters:
      - name: agentId
        in: path
        required: true
        schema:
          type: string
        description: Agent ID
      - name: path
        in: path
        required: true
        schema:
          type: string
        description: Entry path (e.g. notes/test.md)
    get:
      summary: Read knowledge entry
      description: >
        Returns a single knowledge entry with full content. Users can only read
        entries from agents they own. Admins can read any entry.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Entry detail with content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeEntry"
        "401":
          description: Not authenticated
        "403":
          description: Not authorized to view this agent's knowledge
        "404":
          description: Entry not found

  /knowledge/search:
    get:
      summary: Search knowledge entries
      description: >
        Full-text search across knowledge entries. Without agent_id, searches
        across all owned agents (or all agents for admins). With agent_id,
        searches only that agent's entries (ownership enforced for users).
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
          description: Search query
        - name: agent_id
          in: query
          schema:
            type: string
          description: Optional agent ID to scope search
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeSearchResult"
        "400":
          description: Missing q parameter
        "401":
          description: Not authenticated
        "403":
          description: Not authorized to search this agent's knowledge
