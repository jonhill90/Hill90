openapi: 3.0.3
info:
  title: Hill90 API
  description: Hill90 platform API — agent management and lifecycle operations.
  version: 0.1.0

servers:
  - url: /
    description: Relative (behind Traefik reverse proxy)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Agent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agent_id:
          type: string
          description: Unique slug identifier (lowercase, alphanumeric, hyphens)
          pattern: "^[a-z0-9][a-z0-9-]{0,61}[a-z0-9]$"
        name:
          type: string
        description:
          type: string
        tools_config:
          type: object
        cpus:
          type: string
          default: "1.0"
        mem_limit:
          type: string
          default: "1g"
        pids_limit:
          type: integer
          default: 200
        soul_md:
          type: string
        rules_md:
          type: string
        status:
          type: string
          enum: [stopped, running, error]
        container_id:
          type: string
          nullable: true
        model_policy_id:
          type: string
          format: uuid
          nullable: true
          description: ID of the model policy controlling LLM access. Users can assign own or platform policies to own agents; admins can assign any.
        skills:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              name:
                type: string
              scope:
                type: string
                enum: [container_local, host_docker, vps_system]
          description: Skills assigned to this agent (max 1 in current phase).
        error_message:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        created_by:
          type: string

    AgentStatus:
      type: object
      properties:
        db_status:
          type: string
        container:
          type: object
          nullable: true
        error_message:
          type: string
          nullable: true

    UserProfile:
      type: object
      properties:
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        emailVerified:
          type: boolean
        hasAvatar:
          type: boolean

    KnowledgeEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agent_id:
          type: string
        path:
          type: string
        title:
          type: string
        entry_type:
          type: string
          enum: [note, plan, decision, journal, research]
        content:
          type: string
          description: Full markdown content (only included in single-entry reads)
        content_hash:
          type: string
        tags:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, archived]
        sync_status:
          type: string
          enum: [pending, synced, quarantined]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    KnowledgeAgent:
      type: object
      properties:
        agent_id:
          type: string
        entry_count:
          type: integer
        last_updated:
          type: string
          format: date-time

    KnowledgeSearchResult:
      type: object
      properties:
        query:
          type: string
        results:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              agent_id:
                type: string
              path:
                type: string
              title:
                type: string
              entry_type:
                type: string
              tags:
                type: array
                items:
                  type: string
              score:
                type: number
              headline:
                type: string
                description: Search result snippet with highlights
              created_at:
                type: string
                format: date-time
              updated_at:
                type: string
                format: date-time
        count:
          type: integer
        search_type:
          type: string
          example: fts
        score_type:
          type: string
          example: ts_rank

    ModelPolicy:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        allowed_models:
          type: array
          items:
            type: string
        max_requests_per_minute:
          type: integer
          nullable: true
          description: Rate limit (requests per minute). NULL means unlimited.
        max_tokens_per_day:
          type: integer
          nullable: true
          description: Daily token budget. NULL means unlimited.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        updated_by:
          type: string
          nullable: true
        created_by:
          type: string
          nullable: true
          description: Owner (user sub). NULL for platform policies.

    Skill:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        tools_config:
          type: object
          description: JSONB tool configuration (shell, filesystem, health settings)
        instructions_md:
          type: string
          description: Behavioral guidance merged into agent RULES.md at start time (fresh-at-start).
        scope:
          type: string
          enum: [container_local, host_docker, vps_system]
          default: container_local
          description: Scope determines assignment authority. container_local — any user. host_docker/vps_system — admin only.
        is_platform:
          type: boolean
          description: Platform skills are immutable and undeletable.
        created_by:
          type: string
          nullable: true
          description: Always NULL (admin-created shared resources).
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UsageSummary:
      type: object
      properties:
        total_requests:
          type: integer
        successful_requests:
          type: integer
        total_input_tokens:
          type: integer
        total_output_tokens:
          type: integer
        total_tokens:
          type: integer
        total_cost_usd:
          type: number
          format: double

    SharedCollection:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        visibility:
          type: string
          enum: [private, shared]
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SharedSource:
      type: object
      properties:
        id:
          type: string
          format: uuid
        collection_id:
          type: string
          format: uuid
        title:
          type: string
        source_type:
          type: string
          enum: [text, markdown, web_page]
        source_url:
          type: string
          nullable: true
        content_hash:
          type: string
        status:
          type: string
          enum: [pending, active, error, archived]
        error_message:
          type: string
          nullable: true
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SharedSearchResult:
      type: object
      properties:
        query:
          type: string
        results:
          type: array
          items:
            type: object
            properties:
              chunk_id:
                type: string
                format: uuid
              content:
                type: string
              chunk_index:
                type: integer
              score:
                type: number
              headline:
                type: string
              source_id:
                type: string
                format: uuid
              source_title:
                type: string
              source_url:
                type: string
                nullable: true
              document_id:
                type: string
                format: uuid
              document_title:
                type: string
              collection_id:
                type: string
                format: uuid
              collection_name:
                type: string
        count:
          type: integer
        search_type:
          type: string
          example: fts
        score_type:
          type: string
          example: ts_rank

    SharedKnowledgeStats:
      type: object
      description: Aggregate-only quality and operations metrics. No raw query text, no requester identifiers.
      properties:
        search:
          type: object
          properties:
            total:
              type: integer
            zero_result_count:
              type: integer
            zero_result_rate:
              type: number
            avg_duration_ms:
              type: integer
              nullable: true
            by_requester_type:
              type: array
              items:
                type: object
                properties:
                  requester_type:
                    type: string
                  total:
                    type: integer
                  zero_result_count:
                    type: integer
                  zero_result_rate:
                    type: number
        ingest:
          type: object
          properties:
            total_jobs:
              type: integer
            completed:
              type: integer
            failed:
              type: integer
            running:
              type: integer
            pending:
              type: integer
            error_rate:
              type: number
            avg_processing_ms:
              type: integer
              nullable: true
        sources:
          type: object
          properties:
            by_status:
              type: object
              additionalProperties:
                type: integer
            by_type:
              type: object
              additionalProperties:
                type: integer
        corpus:
          type: object
          properties:
            total_collections:
              type: integer
            total_sources:
              type: integer
            total_chunks:
              type: integer
            total_tokens:
              type: integer
        since:
          type: string
          nullable: true

    IngestResult:
      type: object
      properties:
        source:
          $ref: "#/components/schemas/SharedSource"
        ingest_job:
          type: object
          properties:
            id:
              type: string
              format: uuid
            status:
              type: string
            chunk_count:
              type: integer
        document:
          type: object
          properties:
            id:
              type: string
              format: uuid
            title:
              type: string
            chunk_count:
              type: integer

    AgentEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        type:
          type: string
          enum: [command_start, command_complete, file_read, file_write, directory_list, identity_read, health_check]
        tool:
          type: string
          enum: [shell, filesystem, identity, health]
        input_summary:
          type: string
          description: Truncated human-readable input (max 200 chars). May contain command strings.
        output_summary:
          type: string
          nullable: true
          description: Metadata-only result summary (exit codes, byte counts). Never contains raw output.
        duration_ms:
          type: integer
          nullable: true
        success:
          type: boolean
          nullable: true
        metadata:
          type: object
          nullable: true

    Error:
      type: object
      properties:
        error:
          type: string

    Message:
      type: object
      properties:
        message:
          type: string

paths:
  /health:
    get:
      summary: Health check
      description: Returns service health status. Public — no authentication required.
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  service:
                    type: string
                    example: api

  /me:
    get:
      summary: Get current user claims
      description: Returns the JWT claims of the authenticated user.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: JWT claims
          content:
            application/json:
              schema:
                type: object
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /agents:
    get:
      summary: List agents
      description: Returns agents scoped to the authenticated user (all agents for admin).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Agent list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"
        "401":
          description: Not authenticated
        "403":
          description: Requires user role

    post:
      summary: Create agent
      description: Creates a new agent definition.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - agent_id
                - name
              properties:
                agent_id:
                  type: string
                  pattern: "^[a-z0-9][a-z0-9-]{0,61}[a-z0-9]$"
                name:
                  type: string
                description:
                  type: string
                tools_config:
                  type: object
                cpus:
                  type: string
                mem_limit:
                  type: string
                pids_limit:
                  type: integer
                soul_md:
                  type: string
                rules_md:
                  type: string
                model_policy_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: ID of a model policy to assign at creation. Users can assign own or platform policies; admins can assign any.
                skill_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Skill IDs to assign. Config is merged from all skills at save time (resolve-on-save).
      responses:
        "201":
          description: Agent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "400":
          description: Invalid input
        "401":
          description: Not authenticated
        "403":
          description: Requires user role
        "409":
          description: Duplicate agent_id

  /agents/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Get agent detail
      description: Returns a single agent, scoped to ownership.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Agent detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "401":
          description: Not authenticated
        "403":
          description: Requires user role
        "404":
          description: Agent not found

    put:
      summary: Update agent
      description: Updates agent configuration. Agent must be stopped. Users can assign own or platform policies to own agents.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                tools_config:
                  type: object
                cpus:
                  type: string
                mem_limit:
                  type: string
                pids_limit:
                  type: integer
                soul_md:
                  type: string
                rules_md:
                  type: string
                model_policy_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: Model policy ID. Users can assign own or platform policies; admins can assign any. Set to null to remove.
                skill_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Skill IDs to assign. Empty array to detach all skills (Custom mode). Config is merged from all skills at save time.
      responses:
        "200":
          description: Agent updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "401":
          description: Not authenticated
        "403":
          description: Requires user role
        "404":
          description: Agent not found
        "409":
          description: Agent is running

    delete:
      summary: Delete agent
      description: Deletes an agent. Requires admin role. Optionally purges volumes.
      security:
        - bearerAuth: []
      parameters:
        - name: purge
          in: query
          schema:
            type: string
            enum: ["true", "false"]
          description: If "true", also remove agent volumes
      responses:
        "200":
          description: Agent deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
        "401":
          description: Not authenticated
        "403":
          description: Requires admin role
        "404":
          description: Agent not found

  /agents/{id}/start:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Start agent
      description: Creates and starts the agent container. Requires admin role.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Agent started
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: running
                  container_id:
                    type: string
        "401":
          description: Not authenticated
        "403":
          description: Requires admin role
        "404":
          description: Agent not found
        "503":
          description: AGENTBOX_CONFIG_HOST_PATH not configured

  /agents/{id}/stop:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Stop agent
      description: Stops and removes the agent container. Requires admin role.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Agent stopped
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: stopped
        "401":
          description: Not authenticated
        "403":
          description: Requires admin role
        "404":
          description: Agent not found

  /agents/{id}/status:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get agent status
      description: Returns agent status from DB and live container inspection. Scoped to ownership.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Agent status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentStatus"
        "401":
          description: Not authenticated
        "403":
          description: Requires user role
        "404":
          description: Agent not found

  /agents/{id}/events:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get agent events
      description: >
        Returns structured tool invocation events for a running agent.
        With follow=true, returns an SSE stream (text/event-stream).
        Without follow, returns a JSON array of recent events.
        Scoped to ownership — users see own agents only.
      security:
        - bearerAuth: []
      parameters:
        - name: tail
          in: query
          schema:
            type: integer
            default: 100
          description: Number of tail events
        - name: follow
          in: query
          schema:
            type: string
            enum: ["true", "false"]
          description: If "true", stream events via SSE
      responses:
        "200":
          description: Event output (JSON array or SSE stream)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentEvent"
            text/event-stream:
              schema:
                type: string
        "401":
          description: Not authenticated
        "403":
          description: Requires user role
        "404":
          description: Agent not found
        "409":
          description: Agent is not running

  /agents/{id}/logs:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get agent logs
      description: >
        Returns container logs. Requires admin role.
        With follow=true, returns an SSE stream (text/event-stream).
        Without follow, returns JSON with log text.
      security:
        - bearerAuth: []
      parameters:
        - name: tail
          in: query
          schema:
            type: integer
            default: 200
          description: Number of tail lines
        - name: follow
          in: query
          schema:
            type: string
            enum: ["true", "false"]
          description: If "true", stream logs via SSE
      responses:
        "200":
          description: Log output (JSON or SSE stream)
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: string
            text/event-stream:
              schema:
                type: string
        "401":
          description: Not authenticated
        "403":
          description: Requires admin role
        "404":
          description: Agent not found

  /profile:
    get:
      summary: Get user profile
      description: Returns the authenticated user's Keycloak profile and avatar status.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Not authenticated
        "403":
          description: Requires user role

    patch:
      summary: Update display name
      description: Updates firstName and/or lastName via Keycloak Account API.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                  maxLength: 100
                lastName:
                  type: string
                  maxLength: 100
      responses:
        "200":
          description: Updated name
          content:
            application/json:
              schema:
                type: object
                properties:
                  firstName:
                    type: string
                  lastName:
                    type: string
        "400":
          description: Invalid input
        "401":
          description: Not authenticated
        "403":
          description: Requires user role

  /profile/avatar:
    post:
      summary: Upload avatar
      description: Upload or replace avatar image. Resized to 256x256 WebP.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - avatar
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        "200":
          description: Avatar uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          description: Invalid file
        "401":
          description: Not authenticated
        "403":
          description: Requires user role

    delete:
      summary: Delete avatar
      description: Removes the user's avatar from S3 and clears the DB reference.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Avatar deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          description: Not authenticated
        "403":
          description: Requires user role
        "404":
          description: No avatar found

    get:
      summary: Get avatar image
      description: Streams the user's avatar as image/webp. Supports ETag/If-None-Match.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Avatar image
          content:
            image/webp:
              schema:
                type: string
                format: binary
        "304":
          description: Not modified
        "401":
          description: Not authenticated
        "403":
          description: Requires user role
        "404":
          description: No avatar found

  /profile/password:
    post:
      summary: Change password
      description: >
        Password change endpoint. Currently returns 501 because Keycloak 12+ removed
        the /account/credentials/password REST endpoint. A browser-based flow via
        kc_action=UPDATE_PASSWORD will be implemented in a future PR.
      security:
        - bearerAuth: []
      responses:
        "501":
          description: Not yet implemented
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Password change not yet available
                  code:
                    type: string
                    example: NOT_IMPLEMENTED
        "401":
          description: Not authenticated
        "403":
          description: Requires user role

  /knowledge/agents:
    get:
      summary: List agents with knowledge
      description: >
        Returns agents that have knowledge entries, with entry counts and last updated
        timestamps. Scoped to ownership — users see their own agents, admins see all.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Agent knowledge stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeAgent"
        "401":
          description: Not authenticated
        "403":
          description: Requires user role

  /knowledge/entries:
    get:
      summary: List knowledge entries
      description: >
        Returns knowledge entries for a specific agent. Requires agent_id query parameter.
        Users can only list entries for agents they own. Admins can list any agent's entries.
      security:
        - bearerAuth: []
      parameters:
        - name: agent_id
          in: query
          required: true
          schema:
            type: string
          description: Agent ID to list entries for
        - name: type
          in: query
          schema:
            type: string
            enum: [note, plan, decision, journal, research]
          description: Optional entry type filter
      responses:
        "200":
          description: Entry list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeEntry"
        "400":
          description: Missing agent_id parameter
        "401":
          description: Not authenticated
        "403":
          description: Not authorized to view this agent's knowledge

  /knowledge/entries/{agentId}/{path}:
    parameters:
      - name: agentId
        in: path
        required: true
        schema:
          type: string
        description: Agent ID
      - name: path
        in: path
        required: true
        schema:
          type: string
        description: Entry path (e.g. notes/test.md)
    get:
      summary: Read knowledge entry
      description: >
        Returns a single knowledge entry with full content. Users can only read
        entries from agents they own. Admins can read any entry.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Entry detail with content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeEntry"
        "401":
          description: Not authenticated
        "403":
          description: Not authorized to view this agent's knowledge
        "404":
          description: Entry not found

  /knowledge/search:
    get:
      summary: Search knowledge entries
      description: >
        Full-text search across knowledge entries. Without agent_id, searches
        across all owned agents (or all agents for admins). With agent_id,
        searches only that agent's entries (ownership enforced for users).
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
          description: Search query
        - name: agent_id
          in: query
          schema:
            type: string
          description: Optional agent ID to scope search
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeSearchResult"
        "400":
          description: Missing q parameter
        "401":
          description: Not authenticated
        "403":
          description: Not authorized to search this agent's knowledge

  /shared-knowledge/stats:
    get:
      summary: Shared knowledge quality stats
      description: >
        Returns aggregate quality and operations metrics for shared knowledge.
        Response contains only counts, rates, averages, and status distributions.
        No raw query text, no requester identifiers, no cross-user query logs.
      security:
        - bearerAuth: []
      parameters:
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: ISO timestamp to scope time-based stats (search, ingest)
      responses:
        "200":
          description: Aggregate stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedKnowledgeStats"
        "401":
          description: Not authenticated
        "403":
          description: Requires user role

  /shared-knowledge/collections:
    get:
      summary: List shared knowledge collections
      description: >
        Returns shared knowledge collections visible to the authenticated user.
        Users see own private + all shared collections. Admins see all.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Collection list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SharedCollection"
        "401":
          description: Not authenticated
        "403":
          description: Requires user role

    post:
      summary: Create shared knowledge collection
      description: Creates a new shared knowledge collection owned by the authenticated user.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                description:
                  type: string
                visibility:
                  type: string
                  enum: [private, shared]
                  default: private
      responses:
        "200":
          description: Collection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedCollection"
        "401":
          description: Not authenticated
        "403":
          description: Requires user role
        "409":
          description: Duplicate collection name

  /shared-knowledge/collections/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Get shared knowledge collection
      description: Returns a single collection. Users can see own private + shared. Admins see all.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Collection detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedCollection"
        "401":
          description: Not authenticated
        "404":
          description: Collection not found

    put:
      summary: Update shared knowledge collection
      description: Updates a collection. Users can only update own collections.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                visibility:
                  type: string
                  enum: [private, shared]
      responses:
        "200":
          description: Collection updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedCollection"
        "401":
          description: Not authenticated
        "403":
          description: Not authorized to update this collection
        "404":
          description: Collection not found

    delete:
      summary: Delete shared knowledge collection
      description: Deletes a collection and all its sources, documents, and chunks (cascade).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Collection deleted
        "401":
          description: Not authenticated
        "403":
          description: Not authorized to delete this collection
        "404":
          description: Collection not found

  /shared-knowledge/sources:
    get:
      summary: List sources in a collection
      description: Returns sources for a given collection. Visibility-scoped.
      security:
        - bearerAuth: []
      parameters:
        - name: collection_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: Collection ID to list sources from
      responses:
        "200":
          description: Source list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SharedSource"
        "400":
          description: Missing collection_id
        "401":
          description: Not authenticated
        "404":
          description: Collection not found

    post:
      summary: Ingest a source into a collection
      description: >
        Creates a source, runs ingestion (chunking + indexing), and returns
        the source with ingest job summary. V1 supports text and markdown only.
        web_page source type returns 422.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - collection_id
                - title
                - source_type
                - raw_content
              properties:
                collection_id:
                  type: string
                  format: uuid
                title:
                  type: string
                source_type:
                  type: string
                  enum: [text, markdown]
                  description: Content type. web_page reserved for Phase 2.
                raw_content:
                  type: string
                  description: The text or markdown content to ingest (max 100KB)
                source_url:
                  type: string
                  description: Optional source URL for attribution
      responses:
        "200":
          description: Source ingested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
        "401":
          description: Not authenticated
        "403":
          description: Not authorized to add sources to this collection
        "422":
          description: Unsupported source type or invalid content

  /shared-knowledge/sources/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get source by ID
      description: Returns a single source with its metadata, status, and chunk count.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Source details
        "401":
          description: Not authenticated
        "404":
          description: Source not found
    delete:
      summary: Delete source
      description: Deletes a source and its documents/chunks (cascade).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Source deleted
        "401":
          description: Not authenticated
        "403":
          description: Not authorized to delete this source
        "404":
          description: Source not found

  /shared-knowledge/search:
    get:
      summary: Search shared knowledge
      description: >
        Full-text search across shared knowledge chunks. Results include
        provenance (source, document, collection metadata) and relevance scores.
        Scoped to user's visible collections.
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
          description: Search query
        - name: collection_id
          in: query
          schema:
            type: string
            format: uuid
          description: Optional collection filter
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Max results
      responses:
        "200":
          description: Search results with provenance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedSearchResult"
        "400":
          description: Missing q parameter
        "401":
          description: Not authenticated
        "403":
          description: Requires user role

  /provider-connections:
    get:
      summary: List provider connections
      description: Returns provider connections owned by the authenticated user. API keys are never exposed.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Connection list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    name:
                      type: string
                    provider:
                      type: string
                    api_base_url:
                      type: string
                      nullable: true
                    is_valid:
                      type: boolean
                      nullable: true
                    created_at:
                      type: string
                      format: date-time
                    updated_at:
                      type: string
                      format: date-time
        "401":
          description: Not authenticated
        "403":
          description: Requires user role

    post:
      summary: Create provider connection
      description: >
        Creates a new provider connection with an encrypted API key.
        The key is encrypted at rest and never returned in responses.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - provider
                - api_key
              properties:
                name:
                  type: string
                provider:
                  type: string
                  description: Provider identifier (e.g., openai, anthropic)
                api_key:
                  type: string
                  description: Provider API key (encrypted at rest, never returned)
                api_base_url:
                  type: string
                  description: Custom API base URL (optional)
      responses:
        "201":
          description: Connection created
        "400":
          description: Invalid input
        "401":
          description: Not authenticated
        "403":
          description: Requires user role
        "409":
          description: Duplicate connection name

  /provider-connections/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    put:
      summary: Update provider connection
      description: Updates a provider connection. If api_key is provided, it is re-encrypted and is_valid is reset.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                provider:
                  type: string
                api_key:
                  type: string
                api_base_url:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Connection updated
        "401":
          description: Not authenticated
        "403":
          description: Requires user role
        "404":
          description: Connection not found
        "409":
          description: Duplicate connection name

    delete:
      summary: Delete provider connection
      description: Deletes a provider connection. Cascades to user models referencing it.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Connection deleted
        "401":
          description: Not authenticated
        "403":
          description: Requires user role
        "404":
          description: Connection not found

  /provider-connections/{id}/validate:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Validate provider connection
      description: >
        Tests whether the provider key is valid by sending a lightweight request
        through the AI service. Updates is_valid on the connection.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  is_valid:
                    type: boolean
                  error:
                    type: string
                    description: Error message if validation failed
        "401":
          description: Not authenticated
        "403":
          description: Requires user role
        "404":
          description: Connection not found

  /user-models:
    get:
      summary: List user models
      description: Returns models defined by the authenticated user.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Model list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    name:
                      type: string
                    connection_id:
                      type: string
                      format: uuid
                    litellm_model:
                      type: string
                    description:
                      type: string
                    is_active:
                      type: boolean
                    created_at:
                      type: string
                      format: date-time
                    updated_at:
                      type: string
                      format: date-time
        "401":
          description: Not authenticated
        "403":
          description: Requires user role

    post:
      summary: Create user model
      description: >
        Creates a user-defined model referencing a provider connection.
        Name must not conflict with active platform models.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - connection_id
                - litellm_model
              properties:
                name:
                  type: string
                  description: Friendly model name (unique per user)
                connection_id:
                  type: string
                  format: uuid
                  description: Provider connection to use (must be owned by user)
                litellm_model:
                  type: string
                  description: Provider-prefixed model string (e.g., openai/gpt-4o)
                description:
                  type: string
      responses:
        "201":
          description: Model created
        "400":
          description: Invalid input or unowned connection
        "401":
          description: Not authenticated
        "403":
          description: Requires user role
        "409":
          description: Name conflict with platform model or duplicate name

  /user-models/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    put:
      summary: Update user model
      description: Updates a user-defined model. Name collision checks apply on rename.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                connection_id:
                  type: string
                  format: uuid
                litellm_model:
                  type: string
                description:
                  type: string
                is_active:
                  type: boolean
      responses:
        "200":
          description: Model updated
        "400":
          description: Invalid input or unowned connection
        "401":
          description: Not authenticated
        "403":
          description: Requires user role
        "404":
          description: Model not found
        "409":
          description: Name conflict

    delete:
      summary: Delete user model
      description: Deletes a user-defined model.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Model deleted
        "401":
          description: Not authenticated
        "403":
          description: Requires user role
        "404":
          description: Model not found

  /model-policies:
    get:
      summary: List model policies
      description: Returns model policies. Admins see all; users see own + platform.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Policy list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModelPolicy"
        "401":
          description: Not authenticated
        "403":
          description: Requires user role

    post:
      summary: Create model policy
      description: Creates a new model policy. Admin policies are platform-scoped; user policies are owner-scoped. model_aliases can only be set by admins.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - allowed_models
              properties:
                name:
                  type: string
                description:
                  type: string
                allowed_models:
                  type: array
                  items:
                    type: string
                max_requests_per_minute:
                  type: integer
                  nullable: true
                max_tokens_per_day:
                  type: integer
                  nullable: true
                model_aliases:
                  type: object
                  additionalProperties:
                    type: string
                  description: Alias map (admin-only). Each key maps to an allowed_models entry.
      responses:
        "201":
          description: Policy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelPolicy"
        "400":
          description: Invalid input
        "401":
          description: Not authenticated
        "403":
          description: Requires user role
        "409":
          description: Duplicate policy name

  /model-policies/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Get model policy
      description: Returns a single model policy. Users can see own + platform policies.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Policy detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelPolicy"
        "401":
          description: Not authenticated
        "403":
          description: Requires user role
        "404":
          description: Policy not found

    put:
      summary: Update model policy
      description: Updates a model policy. Users can update own policies; admins can update any. model_aliases can only be set by admins.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                allowed_models:
                  type: array
                  items:
                    type: string
                max_requests_per_minute:
                  type: integer
                  nullable: true
                max_tokens_per_day:
                  type: integer
                  nullable: true
                model_aliases:
                  type: object
                  additionalProperties:
                    type: string
                  description: Alias map (admin-only). Each key maps to an allowed_models entry.
      responses:
        "200":
          description: Policy updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelPolicy"
        "401":
          description: Not authenticated
        "403":
          description: Requires user role (model_aliases requires admin)
        "404":
          description: Policy not found
        "409":
          description: Duplicate policy name

    delete:
      summary: Delete model policy
      description: Deletes a model policy. Fails if agents are assigned. Users can delete own; admins can delete any.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Policy deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
        "401":
          description: Not authenticated
        "403":
          description: Requires user role
        "404":
          description: Policy not found
        "409":
          description: Agents are assigned to this policy

  /usage:
    get:
      summary: Query usage
      description: >
        Query model usage with optional filtering by agent, model, request type,
        and date range. Supports grouping by agent, model, day, or request type.
        Users see own usage only (via owner column); admins see all.
      security:
        - bearerAuth: []
      parameters:
        - name: agent_id
          in: query
          schema:
            type: string
          description: Filter by agent ID
        - name: model_name
          in: query
          schema:
            type: string
          description: Filter by model name
        - name: request_type
          in: query
          schema:
            type: string
            enum: [chat.completion, embedding]
          description: Filter by request type
        - name: from
          in: query
          schema:
            type: string
            format: date
          description: Start date (defaults to today)
        - name: to
          in: query
          schema:
            type: string
            format: date
          description: End date (inclusive)
        - name: group_by
          in: query
          schema:
            type: string
            enum: [agent, model, day, request_type]
          description: Group results by dimension
      responses:
        "200":
          description: Usage data
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/UsageSummary"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/UsageSummary"
                      group_by:
                        type: string
        "401":
          description: Not authenticated
        "403":
          description: Requires user role

  /skills:
    get:
      summary: List skills
      description: Returns all skills. All authenticated users see all skills.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Skill list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Skill"
        "401":
          description: Not authenticated
        "403":
          description: Requires user role

    post:
      summary: Create skill
      description: Creates a new skill. Admin only.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - tools_config
              properties:
                name:
                  type: string
                description:
                  type: string
                tools_config:
                  type: object
                  description: Tool configuration (shell, filesystem, health settings)
                instructions_md:
                  type: string
                  description: Behavioral guidance merged into agent RULES.md at start time.
                scope:
                  type: string
                  enum: [container_local, host_docker, vps_system]
                  default: container_local
                  description: Scope determines assignment authority.
      responses:
        "201":
          description: Skill created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"
        "400":
          description: Invalid input
        "401":
          description: Not authenticated
        "403":
          description: Requires admin role
        "409":
          description: Duplicate skill name

  /skills/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Get skill
      description: Returns a single skill. All authenticated users can read.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Skill detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"
        "401":
          description: Not authenticated
        "403":
          description: Requires user role
        "404":
          description: Skill not found

    put:
      summary: Update skill
      description: Updates a skill. Admin only. Platform skills are immutable (403).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                tools_config:
                  type: object
                instructions_md:
                  type: string
                scope:
                  type: string
                  enum: [container_local, host_docker, vps_system]
      responses:
        "200":
          description: Skill updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"
        "401":
          description: Not authenticated
        "403":
          description: Requires admin role or platform skill is immutable
        "404":
          description: Skill not found
        "409":
          description: Duplicate skill name

    delete:
      summary: Delete skill
      description: Deletes a skill. Admin only. Platform skills cannot be deleted. Skills assigned to agents cannot be deleted.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Skill deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
        "401":
          description: Not authenticated
        "403":
          description: Requires admin role or platform skill is undeletable
        "404":
          description: Skill not found
        "409":
          description: Skill is assigned to agents

  /agents/{id}/skills:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    post:
      summary: Assign skill to agent
      description: |
        Assigns a skill from the catalog to an agent. Agent must be stopped.
        RBAC on scope: container_local — any user (own agents). host_docker/vps_system — admin only.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - skill_id
              properties:
                skill_id:
                  type: string
                  format: uuid
                  description: ID of the skill (tool preset) to assign
      responses:
        "201":
          description: Skill assigned
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_id:
                    type: string
                    format: uuid
                  skill_id:
                    type: string
                    format: uuid
                  assigned_at:
                    type: string
                    format: date-time
                  assigned_by:
                    type: string
        "400":
          description: Missing skill_id
        "401":
          description: Not authenticated
        "403":
          description: Elevated scope requires admin role
        "404":
          description: Agent or skill not found
        "409":
          description: Agent is running or skill already assigned

  /agents/{id}/skills/{skillId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: skillId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    delete:
      summary: Remove skill from agent
      description: |
        Removes a skill assignment from an agent. Agent must be stopped.
        RBAC on scope: container_local — any user (own agents). host_docker/vps_system — admin only.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Skill removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  removed:
                    type: boolean
        "401":
          description: Not authenticated
        "403":
          description: Elevated scope requires admin role
        "404":
          description: Agent, skill, or assignment not found
        "409":
          description: Agent is running
