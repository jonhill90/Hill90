version: '3.9'

# MCP Gateway service
# Deploy with: make deploy-mcp

networks:
  edge:
    external: true
    name: hill90_edge
  internal:
    external: true
    name: hill90_internal

services:
  # MCP Gateway (Python/FastAPI)
  mcp:
    build:
      context: ../../../services/mcp
      dockerfile: Dockerfile
    image: hill90/mcp:${VERSION:-latest}
    container_name: mcp
    restart: unless-stopped
    networks:
      - edge
      - internal
    environment:
      - ENVIRONMENT=production
      - PORT=8001
      - KEYCLOAK_ISSUER=https://auth.hill90.com/realms/hill90
      - KEYCLOAK_JWKS_URI=https://auth.hill90.com/realms/hill90/protocol/openid-connect/certs
      - OTEL_SERVICE_NAME=mcp
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mcp.rule=Host(`ai.hill90.com`) && PathPrefix(`/mcp`)"
      - "traefik.http.routers.mcp.entrypoints=websecure"
      - "traefik.http.routers.mcp.tls.certresolver=letsencrypt"
      - "traefik.http.services.mcp.loadbalancer.server.port=8001"
      - "traefik.http.routers.mcp.middlewares=mcp-strip@file"
