version: '3.9'

# PostgreSQL database (shared infrastructure)
# Deploy with: make deploy-db

networks:
  internal:
    external: true
    name: hill90_internal

volumes:
  postgres-data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../../platform/data/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=hill90
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    container_name: postgres-exporter
    restart: unless-stopped
    mem_limit: 64m
    networks:
      - internal
    environment:
      - DATA_SOURCE_URI=postgres:5432/hill90?sslmode=disable
      - DATA_SOURCE_USER=${DB_USER}
      - DATA_SOURCE_PASS=${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "postgres_exporter", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
