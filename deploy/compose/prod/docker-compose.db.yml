version: '3.9'

# PostgreSQL database (shared infrastructure)
# Deploy with: make deploy-db

networks:
  internal:
    external: true
    name: hill90_internal

volumes:
  postgres-data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../../platform/data/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=hill90
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
