version: '3.9'

# Keycloak identity provider
# Deploy with: make deploy-auth

networks:
  edge:
    external: true
    name: hill90_edge
  internal:
    external: true
    name: hill90_internal

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.4.0
    container_name: keycloak
    restart: unless-stopped
    networks:
      - edge
      - internal
    volumes:
      - ../../../platform/auth/keycloak/hill90-realm.json:/opt/keycloak/data/import/hill90-realm.json:ro
      - ../../../platform/auth/keycloak/themes/hill90:/opt/keycloak/themes/hill90:ro
    tmpfs:
      - /opt/keycloak/data/tmp:size=100m
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/keycloak
      - KC_DB_USERNAME=${DB_USER}
      - KC_DB_PASSWORD=${DB_PASSWORD}
      - KC_HOSTNAME=https://auth.hill90.com
      - KC_PROXY_HEADERS=xforwarded
      - KC_HTTP_ENABLED=true
      - KC_HEALTH_ENABLED=true
      - KC_METRICS_ENABLED=true
      - KC_HTTP_METRICS_HISTOGRAMS_ENABLED=true
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KC_ADMIN_USERNAME}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KC_ADMIN_PASSWORD}
      - JAVA_OPTS_APPEND=-Xms256m -Xmx768m
      - KC_TRACING_ENABLED=true
      - KC_TRACING_ENDPOINT=http://tempo:4317
      - KC_TRACING_PROTOCOL=grpc
      - KC_TELEMETRY_SERVICE_NAME=keycloak
    command: start --import-realm --spi-theme-cache-themes=false
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/9000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
      # All Keycloak traffic on auth.hill90.com (admin protected by KC credentials + MFA)
      - "traefik.http.routers.keycloak.rule=Host(`auth.hill90.com`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls.certresolver=letsencrypt"
      - "traefik.http.routers.keycloak.service=keycloak"
