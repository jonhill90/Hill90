version: '3.9'

# Observability stack: Prometheus, Loki, Tempo, Grafana + collectors
# Deploy with: make deploy-observability

networks:
  edge:
    external: true
    name: hill90_edge
  internal:
    external: true
    name: hill90_internal

volumes:
  prometheus-data:
    name: prometheus-data
  loki-data:
    name: loki-data
  tempo-data:
    name: tempo-data
  grafana-data:
    name: grafana-data
  promtail-positions:
    name: promtail-positions

services:
  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: prometheus
    restart: unless-stopped
    mem_limit: 1g
    networks:
      - edge
      - internal
    volumes:
      - ../../../platform/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../../platform/observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--storage.tsdb.retention.size=20GB"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  loki:
    image: grafana/loki:3.5.0
    container_name: loki
    restart: unless-stopped
    mem_limit: 512m
    networks:
      - internal
    volumes:
      - ../../../platform/observability/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki.yml
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  tempo:
    image: grafana/tempo:2.7.2
    container_name: tempo
    restart: unless-stopped
    mem_limit: 1g
    networks:
      - internal
    volumes:
      - ../../../platform/observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    command: -config.file=/etc/tempo/tempo.yml
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3200/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:11.6.0
    container_name: grafana
    restart: unless-stopped
    mem_limit: 256m
    networks:
      - edge
      - internal
    volumes:
      - grafana-data:/var/lib/grafana
      - ../../../platform/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://grafana.hill90.com
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.hill90.com`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt-dns"
      - "traefik.http.routers.grafana.middlewares=tailscale-only@file"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  promtail:
    image: grafana/promtail:3.5.0
    container_name: promtail
    restart: unless-stopped
    mem_limit: 128m
    networks:
      - internal
    volumes:
      - ../../../platform/observability/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail-positions:/var/lib/promtail
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      - loki
    healthcheck:
      test: ["CMD", "promtail", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3

  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: node-exporter
    restart: unless-stopped
    mem_limit: 64m
    networks:
      - internal
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: cadvisor
    restart: unless-stopped
    mem_limit: 128m
    # cAdvisor requires privileged mode to access cgroup and kernel metrics
    privileged: true
    networks:
      - internal
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
