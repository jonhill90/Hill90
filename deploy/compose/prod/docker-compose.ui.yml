version: '3.9'

# UI service
# Deploy with: make deploy-ui

networks:
  edge:
    external: true
    name: hill90_edge
  internal:
    external: true
    name: hill90_internal

services:
  # UI (Next.js)
  ui:
    build:
      context: ../../../services/ui
      dockerfile: Dockerfile
    image: hill90/ui:${VERSION:-latest}
    container_name: ui
    restart: unless-stopped
    networks:
      - edge
      - internal
    environment:
      - NODE_ENV=production
      - API_URL=http://api:3000
      - AI_URL=http://ai:8000
      - KEYCLOAK_INTERNAL_URL=http://keycloak:8080
      - MCP_URL=http://mcp:8001
      - AUTH_KEYCLOAK_ID=${AUTH_KEYCLOAK_ID}
      - AUTH_KEYCLOAK_SECRET=${AUTH_KEYCLOAK_SECRET}
      - AUTH_KEYCLOAK_ISSUER=https://auth.hill90.com/realms/hill90
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=https://hill90.com
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ui.rule=Host(`hill90.com`) || Host(`www.hill90.com`)"
      - "traefik.http.routers.ui.entrypoints=websecure"
      - "traefik.http.routers.ui.tls.certresolver=letsencrypt"
      - "traefik.http.services.ui.loadbalancer.server.port=3000"
      - "traefik.http.routers.ui.middlewares=rate-limit@file"
