# Canonical mapping: vault KV paths <-> SOPS keys <-> compose ${VAR} refs
# Validated by scripts/checks/check_secrets_schema.py
#
# Each runtime_secrets entry maps:
#   key:          The env var name
#   vault_path:   Vault KV v2 path where this key lives
#   compose_refs: Compose files that reference ${KEY} (basename only)
#   dedup:        (optional) Other vault paths that contain this key
#
# Validation runs on every PR (advisory). Catches drift between vault,
# SOPS, and compose before it reaches production.

# Non-secret env vars referenced in compose files via ${VAR} but NOT
# stored in vault or SOPS. These are skipped during validation.
excluded_vars:
  - VERSION

runtime_secrets:
  # --- secret/shared/database ---
  - key: DB_USER
    vault_path: secret/shared/database
    compose_refs:
      - docker-compose.db.yml
      - docker-compose.auth.yml
      - docker-compose.api.yml
      - docker-compose.ai.yml
      - docker-compose.knowledge.yml

  - key: DB_PASSWORD
    vault_path: secret/shared/database
    compose_refs:
      - docker-compose.db.yml
      - docker-compose.auth.yml
      - docker-compose.api.yml
      - docker-compose.ai.yml
      - docker-compose.knowledge.yml

  - key: DB_NAME
    vault_path: secret/shared/database
    compose_refs: []

  # --- secret/shared/jwt ---
  - key: JWT_SECRET
    vault_path: secret/shared/jwt
    compose_refs: []

  - key: JWT_PRIVATE_KEY
    vault_path: secret/shared/jwt
    compose_refs: []

  - key: JWT_PUBLIC_KEY
    vault_path: secret/shared/jwt
    compose_refs: []

  # --- secret/api/config ---
  - key: INTERNAL_SERVICE_SECRET
    vault_path: secret/api/config
    compose_refs: []
    dedup:
      - secret/mcp/config

  - key: MINIO_ROOT_USER
    vault_path: secret/api/config
    compose_refs:
      - docker-compose.api.yml
      - docker-compose.minio.yml
    dedup:
      - secret/minio/config

  - key: MINIO_ROOT_PASSWORD
    vault_path: secret/api/config
    compose_refs:
      - docker-compose.api.yml
      - docker-compose.minio.yml
    dedup:
      - secret/minio/config

  # --- secret/ai/config ---
  - key: ANTHROPIC_API_KEY
    vault_path: secret/ai/config
    compose_refs:
      - docker-compose.ai.yml

  - key: OPENAI_API_KEY
    vault_path: secret/ai/config
    compose_refs:
      - docker-compose.ai.yml

  - key: LITELLM_MASTER_KEY
    vault_path: secret/ai/config
    compose_refs:
      - docker-compose.ai.yml

  # --- secret/shared/model-router ---
  - key: MODEL_ROUTER_INTERNAL_SERVICE_TOKEN
    vault_path: secret/shared/model-router
    compose_refs:
      - docker-compose.ai.yml
      - docker-compose.api.yml

  - key: MODEL_ROUTER_SIGNING_PRIVATE_KEY
    vault_path: secret/shared/model-router
    compose_refs:
      - docker-compose.api.yml

  # --- secret/auth/config ---
  - key: KC_ADMIN_USERNAME
    vault_path: secret/auth/config
    compose_refs:
      - docker-compose.auth.yml

  - key: KC_ADMIN_PASSWORD
    vault_path: secret/auth/config
    compose_refs:
      - docker-compose.auth.yml

  - key: SMTP_PASSWORD
    vault_path: secret/auth/config
    compose_refs: []

  # --- secret/ui/config ---
  - key: AUTH_KEYCLOAK_ID
    vault_path: secret/ui/config
    compose_refs:
      - docker-compose.ui.yml

  - key: AUTH_KEYCLOAK_SECRET
    vault_path: secret/ui/config
    compose_refs:
      - docker-compose.ui.yml

  - key: AUTH_SECRET
    vault_path: secret/ui/config
    compose_refs:
      - docker-compose.ui.yml

  # --- secret/minio/config (canonical for minio-only keys) ---
  # MINIO_ROOT_USER and MINIO_ROOT_PASSWORD are declared above under
  # secret/api/config (canonical) with dedup pointing here.

  # --- secret/infra/traefik ---
  - key: TRAEFIK_ADMIN_PASSWORD_HASH
    vault_path: secret/infra/traefik
    compose_refs: []

  - key: ACME_EMAIL
    vault_path: secret/infra/traefik
    compose_refs: []

  - key: ACME_CA_SERVER
    vault_path: secret/infra/traefik
    compose_refs:
      - docker-compose.infra.yml

  # --- secret/infra/dns-manager ---
  - key: HOSTINGER_API_KEY
    vault_path: secret/infra/dns-manager
    compose_refs:
      - docker-compose.infra.yml

  # --- secret/knowledge/config ---
  - key: AKM_INTERNAL_SERVICE_TOKEN
    vault_path: secret/knowledge/config
    compose_refs:
      - docker-compose.knowledge.yml
      - docker-compose.api.yml

  - key: AKM_SIGNING_PRIVATE_KEY
    vault_path: secret/knowledge/config
    compose_refs:
      - docker-compose.api.yml

  - key: AKM_SIGNING_PUBLIC_KEY
    vault_path: secret/knowledge/config
    compose_refs: []

  # --- secret/observability/grafana ---
  - key: GRAFANA_ADMIN_PASSWORD
    vault_path: secret/observability/grafana
    compose_refs:
      - docker-compose.observability.yml

# SOPS-only secrets: bootstrap/infrastructure keys that have no vault
# KV mapping. These must exist in prod.enc.env.example but are not
# expected in vault.
bootstrap_secrets:
  - VPS_HOST
  - VPS_IP
  - TAILSCALE_AUTH_KEY
  - GHCR_TOKEN

# Vault management secrets: generated during vault setup, stored in
# SOPS for DR. No compose ${VAR} references.
vault_management_secrets:
  - OPENBAO_UNSEAL_KEY
  - VAULT_OIDC_CLIENT_SECRET
  - VAULT_SYNC_TOKEN

# Services that get AppRole credentials (VAULT_{SVC}_ROLE_ID and
# VAULT_{SVC}_SECRET_ID pairs in SOPS).
vault_approle_services:
  - db
  - api
  - ai
  - auth
  - ui
  - minio
  - infra
  - observability
  - knowledge
