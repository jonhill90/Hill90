version: 1
id: coder
name: Coder Agent
description: Code generation, git operations, build tasks
soul_path: SOUL.md
rules_path: RULES.md

tools:
  shell:
    enabled: true
    allowed_binaries:
      - /usr/bin/git
      - /usr/bin/npm
      - /usr/bin/node
      - /usr/bin/python3
      - /usr/bin/pip
      - /usr/local/bin/poetry
      - /usr/bin/make
      - /usr/local/bin/akm
    denied_patterns:
      - "rm\\s+-rf\\s+/"
      - ":(){ :|:& };:"
      - "mkfs"
      - "shutdown|reboot|halt"
      - ">/dev/sd"
    max_timeout: 300
  filesystem:
    enabled: true
    read_only: false
    allowed_paths:
      - /workspace
    denied_paths:
      - /etc/shadow
      - /etc/passwd
      - /root
  health:
    enabled: true

resources:
  cpus: "1.0"
  mem_limit: 1g
  pids_limit: 200

state:
  workspace: /workspace
  logs: /var/log/agentbox
  data: /data
