# Traefik Dynamic Configuration - Middlewares
# https://doc.traefik.io/traefik/middlewares/overview/

http:
  middlewares:
    # Security Headers
    security-headers:
      headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        customFrameOptionsValue: "SAMEORIGIN"
        customResponseHeaders:
          X-Robots-Tag: "none,noarchive,nosnippet,notranslate,noimageindex"
          Server: ""

    # Rate Limiting
    rate-limit:
      rateLimit:
        average: 100
        period: 1s
        burst: 50

    # Basic Auth for Traefik Dashboard
    auth:
      basicAuth:
        usersFile: /etc/traefik/dynamic/.htpasswd

    # Tailscale-only access (CGNAT range)
    # NOTE: ipWhiteList is Traefik v2. If upgrading to v3, use ipAllowList.
    tailscale-only:
      ipWhiteList:
        sourceRange:
          - "100.64.0.0/10"

    # Strip /mcp prefix for MCP service
    mcp-strip:
      stripPrefix:
        prefixes:
          - "/mcp"

    # Compression
    compress:
      compress: {}

    # CORS (if needed)
    cors:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
        accessControlAllowOriginList:
          - "https://hill90.com"
          - "https://www.hill90.com"
        accessControlMaxAge: 100
        addVaryHeader: true
