# LiteLLM proxy configuration
# Provider API keys come from environment variables set via Docker Compose.
# Master key is required and set via LITELLM_MASTER_KEY env var.
# Database URL is required for dashboard/admin features.

model_list:
  - model_name: claude-sonnet-4-20250514
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: text-embedding-3-small
    litellm_params:
      model: openai/text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY

  - model_name: text-embedding-ada-002
    litellm_params:
      model: openai/text-embedding-ada-002
      api_key: os.environ/OPENAI_API_KEY

  # BYOK wildcard routes — accept per-request api_key from AI service
  - model_name: openai/*
    litellm_params:
      model: openai/*
      configurable_clientside_auth_params: ["api_key", "api_base"]

  - model_name: anthropic/*
    litellm_params:
      model: anthropic/*
      configurable_clientside_auth_params: ["api_key"]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

litellm_settings:
  drop_params: true
  set_verbose: false
