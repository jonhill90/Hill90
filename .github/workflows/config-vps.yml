name: Config VPS (OS Configuration Only)

# Manual trigger or auto-triggered by recreate-vps
# Configures VPS OS: Docker, Tailscale, firewall, secrets
# Does NOT deploy containers - auto-triggers deploy-infra afterward
on:
  workflow_dispatch:
    inputs:
      vps_ip:
        description: 'VPS Public IP address'
        required: true
        type: string

jobs:
  validate:
    name: Validate Prerequisites
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate VPS IP format
        run: |
          VPS_IP="${{ github.event.inputs.vps_ip }}"
          if ! [[ "$VPS_IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid IP address format"
            exit 1
          fi
          echo "✅ VPS IP valid: $VPS_IP"

      - name: Validate Ansible playbooks exist
        run: |
          echo "🔍 Validating Ansible playbooks..."

          PLAYBOOKS=(
            "infra/ansible/playbooks/01-system-prep.yml"
            "infra/ansible/playbooks/02-firewall.yml"
            "infra/ansible/playbooks/03-tailscale.yml"
            "infra/ansible/playbooks/04-ssh-lockdown.yml"
            "infra/ansible/playbooks/05-docker.yml"
            "infra/ansible/playbooks/06-sops.yml"
            "infra/ansible/playbooks/07-age.yml"
            "infra/ansible/playbooks/08-secrets.yml"
            "infra/ansible/playbooks/bootstrap.yml"
          )

          for playbook in "${PLAYBOOKS[@]}"; do
            if [[ ! -f "$playbook" ]]; then
              echo "❌ Missing: $playbook"
              exit 1
            fi
          done

          echo "✅ All Ansible playbooks present (01-08 + bootstrap)"

  config:
    name: Configure VPS OS
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      actions: write
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull latest secrets
        run: |
          echo "📥 Pulling latest changes (including updated secrets from recreate)..."
          git pull origin main

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-actions

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/remote.hill90.com
          chmod 600 ~/.ssh/remote.hill90.com

      - name: Setup SOPS/age for secrets
        run: |
          # Install SOPS
          curl -L -o /tmp/sops https://github.com/getsops/sops/releases/download/v3.9.0/sops-v3.9.0.linux.amd64
          chmod +x /tmp/sops
          sudo mv /tmp/sops /usr/local/bin/sops

          # Setup age key (exact same as working version)
          mkdir -p ~/.config/sops/age
          echo "${{ secrets.SOPS_AGE_KEY }}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      # SSH verification removed - recreate-vps already verified SSH is working
      # and auto-triggers config-vps immediately to minimize timing gaps

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Capture Tailscale auth key
        id: get-tailscale-auth-key
        env:
          SOPS_AGE_KEY_FILE: /home/runner/.config/sops/age/keys.txt
        run: |
          echo "🔑 Extracting Tailscale auth key..."
          TAILSCALE_AUTH_KEY=$(sops -d --extract '["TAILSCALE_AUTH_KEY"]' infra/secrets/prod.enc.env)
          echo "::add-mask::$TAILSCALE_AUTH_KEY"
          echo "tailscale_auth_key=$TAILSCALE_AUTH_KEY" >> $GITHUB_OUTPUT

      - name: Create age key file for Ansible
        run: |
          echo "🔐 Creating age key file for Ansible..."
          mkdir -p infra/secrets/keys
          echo "${{ secrets.SOPS_AGE_KEY }}" > infra/secrets/keys/age-prod.key
          chmod 600 infra/secrets/keys/age-prod.key

      - name: Run make config-vps
        env:
          VPS_IP: ${{ github.event.inputs.vps_ip }}
          TAILSCALE_AUTH_KEY: ${{ steps.get-tailscale-auth-key.outputs.tailscale_auth_key }}
          SOPS_AGE_KEY_FILE: /home/runner/.config/sops/age/keys.txt
        run: |
          echo "🔧 Running VPS bootstrap via make config-vps..."
          make config-vps VPS_IP=$VPS_IP

      - name: Capture Tailscale IP from secrets
        id: get-tailscale-ip
        env:
          SOPS_AGE_KEY_FILE: /home/runner/.config/sops/age/keys.txt
        run: |
          echo "🌐 Reading Tailscale IP from encrypted secrets..."
          TAILSCALE_IP=$(sops -d --extract '["TAILSCALE_IP"]' infra/secrets/prod.enc.env)
          echo "::add-mask::$TAILSCALE_IP"
          echo "tailscale_ip=$TAILSCALE_IP" >> $GITHUB_OUTPUT
          echo "✅ Tailscale IP: $TAILSCALE_IP"

      - name: Commit updated secrets
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          if git diff --quiet infra/secrets/prod.enc.env; then
            echo "No changes to commit"
          else
            git add infra/secrets/prod.enc.env
            git commit -m "Update TAILSCALE_IP after VPS config

          Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>"
            git push
          fi

      - name: Update DNS records
        env:
          HOSTINGER_API_KEY: ${{ secrets.HOSTINGER_API_KEY }}
        run: |
          echo "🌐 Updating DNS records..."
          bash scripts/hostinger.sh dns sync \
            "${{ github.event.inputs.vps_ip }}" \
            "${{ steps.get-tailscale-ip.outputs.tailscale_ip }}"

      - name: Auto-trigger deploy-infra workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🚀 Auto-triggering deploy-infra workflow..."
          gh workflow run deploy-infra.yml
          echo "✅ deploy-infra triggered"
          echo ""
          echo "💡 Monitor deploy-infra progress:"
          echo "   gh run list --workflow=deploy-infra.yml --limit 1"

      - name: Summary
        if: success()
        run: |
          echo "🎉 VPS OS Configuration Complete!"
          echo ""
          echo "📊 Configuration details:"
          echo "  VPS Public IP: ${{ github.event.inputs.vps_ip }}"
          echo "  VPS Tailscale IP: ${{ steps.get-tailscale-ip.outputs.tailscale_ip }}"
          echo ""
          echo "✅ OS configured:"
          echo "  • Docker + Docker Compose installed"
          echo "  • Tailscale connected"
          echo "  • SSH locked down (Tailscale-only)"
          echo "  • Firewall configured (HTTP/HTTPS public, SSH Tailscale-only)"
          echo "  • SOPS + age installed"
          echo "  • Secrets transferred"
          echo ""
          echo "🌐 DNS records updated:"
          echo "  • hill90.com → ${{ github.event.inputs.vps_ip }}"
          echo "  • api.hill90.com → ${{ github.event.inputs.vps_ip }}"
          echo "  • ai.hill90.com → ${{ github.event.inputs.vps_ip }}"
          echo "  • portainer.hill90.com → ${{ steps.get-tailscale-ip.outputs.tailscale_ip }}"
          echo "  • traefik.hill90.com → ${{ steps.get-tailscale-ip.outputs.tailscale_ip }}"
          echo ""
          echo "🚀 Infrastructure deployment auto-triggered:"
          echo "  • deploy-infra workflow will deploy Traefik, dns-manager, Portainer"
          echo "  • Monitor progress: gh run list --workflow=deploy-infra.yml --limit 1"
          echo ""
          echo "✅ SSH access:"
          echo "  ssh -i ~/.ssh/remote.hill90.com deploy@${{ steps.get-tailscale-ip.outputs.tailscale_ip }}"
