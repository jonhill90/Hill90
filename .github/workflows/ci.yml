name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate harness freshness
        run: python3 scripts/checks/check_harness_freshness.py

      - name: Validate markdown links
        run: python3 scripts/checks/check_md_links.py

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Check legacy agentbox paths removed
        run: bash scripts/checks/check_legacy_agentbox.sh

      - name: Run bats tests
        run: bats tests/scripts/

      - name: Validate compose files
        run: |
          for f in deploy/compose/prod/docker-compose*.yml; do
            echo "Validating $f..."
            docker compose -f "$f" config > /dev/null
          done

      - name: Validate Traefik config
        run: bash scripts/validate.sh traefik

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint scripts
        run: shellcheck --severity=error scripts/*.sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run API tests
        working-directory: src/services/api
        run: npm ci && npm test

      - name: Validate OpenAPI spec
        working-directory: src/services/api
        run: npx --yes @redocly/cli lint src/openapi/openapi.yaml --skip-rule no-unused-components

      - name: Run UI tests
        working-directory: src/services/ui
        run: npm ci && npm test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run MCP tests
        working-directory: src/services/mcp
        run: |
          pip install poetry
          poetry install --no-root
          poetry run pytest tests/ -v
