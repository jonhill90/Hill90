name: Validate Repository

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate harness freshness
        run: python3 scripts/checks/check_harness_freshness.py

      - name: Validate closed-loop plan evidence
        if: github.event_name == 'pull_request'
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          PLAN_CLOSED_LOOP_STRICT: "0"
        run: python3 scripts/checks/check_plan_closed_loop.py

      - name: Validate markdown links
        run: python3 scripts/checks/check_md_links.py

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Check legacy agentbox paths removed
        run: bash scripts/checks/check_legacy_agentbox.sh

      - name: Run bats tests
        run: bats tests/scripts/

      - name: Validate compose files
        run: |
          for f in deploy/compose/prod/docker-compose*.yml; do
            echo "Validating $f..."
            docker compose -f "$f" config > /dev/null
          done

      - name: Validate Traefik config
        run: bash scripts/validate.sh traefik

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint scripts
        run: shellcheck --severity=error scripts/*.sh

      - name: Assert deploy safety invariants
        run: |
          echo "Checking: no --remove-orphans..."
          ! (grep -- "--remove-orphans" scripts/deploy.sh | grep -v "^#" | grep -v "^[[:space:]]*#")

          echo "Checking: all docker compose calls use -p..."
          ! (grep "docker compose" scripts/deploy.sh | grep -v "^#" | grep -v "^[[:space:]]*#" | grep -v -- "-p ")

          echo "All safety checks passed."

      - name: Assert compose volume naming
        run: python3 scripts/checks/check_volume_names.py

      - name: Assert no destructive volume commands
        run: bash scripts/checks/check_destructive_commands.sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run API tests
        working-directory: services/api
        run: npm ci && npm test

      - name: Validate OpenAPI spec
        working-directory: services/api
        run: npx --yes @redocly/cli lint src/openapi/openapi.yaml --skip-rule no-unused-components

      - name: Validate docs OpenAPI sync
        run: diff services/api/src/openapi/openapi.yaml docs-site/openapi.yaml

      - name: Check docs for sensitive content
        run: bash scripts/checks/check_docs_secrets.sh

      - name: Run UI tests
        working-directory: services/ui
        run: npm ci && npm test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run check script tests
        run: pip install pytest pyyaml && pytest tests/checks/ -v

      - name: Run MCP tests
        working-directory: services/mcp
        run: |
          pip install poetry
          poetry install --no-root
          poetry run pytest tests/ -v
