name: Reusable Deploy Service

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string

jobs:
  deploy:
    name: Deploy ${{ inputs.service }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-actions

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key

      - name: Setup SOPS/age for secrets
        run: |
          curl -L -o /tmp/sops https://github.com/getsops/sops/releases/download/v3.8.1/sops-v3.8.1.linux.amd64
          chmod +x /tmp/sops
          sudo mv /tmp/sops /usr/local/bin/sops

          mkdir -p ~/.config/sops/age
          echo "${{ secrets.SOPS_AGE_KEY }}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Get Tailscale IP from secrets
        id: get-ip
        run: |
          TAILSCALE_IP=$(sops -d --extract '["TAILSCALE_IP"]' infra/secrets/prod.enc.env)
          echo "::add-mask::$TAILSCALE_IP"
          echo "tailscale_ip=$TAILSCALE_IP" >> $GITHUB_OUTPUT

      - name: Verify SSH connectivity
        run: |
          ssh -i ~/.ssh/vps_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            deploy@${{ steps.get-ip.outputs.tailscale_ip }} 'echo "SSH connection successful"'

      - name: Deploy ${{ inputs.service }}
        run: |
          # deploy.sh automatically runs pre-deploy backup for stateful services
          # (db, minio, auth, observability) before the down/up cycle.
          echo "Deploying ${{ inputs.service }}..."
          ssh -i ~/.ssh/vps_key -o StrictHostKeyChecking=no \
            deploy@${{ steps.get-ip.outputs.tailscale_ip }} \
            "cd /opt/hill90/app && \
             git fetch origin && \
             git diff --stat HEAD origin/main && \
             git reset --hard origin/main && \
             export SOPS_AGE_KEY_FILE=/opt/hill90/secrets/keys/keys.txt && \
             bash scripts/deploy.sh ${{ inputs.service }} prod"

      - name: Verify readiness
        run: |
          ssh -i ~/.ssh/vps_key -o StrictHostKeyChecking=no \
            deploy@${{ steps.get-ip.outputs.tailscale_ip }} \
            "cd /opt/hill90/app && bash scripts/deploy.sh verify ${{ inputs.service }}"

      - name: Signal post-deploy hooks
        if: success() && inputs.service == 'auth'
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: deploy-auth-success

      - name: Notify deploy result
        if: always() && env.DEPLOY_WEBHOOK_URL != ''
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          STATUS="${{ job.status }}"
          EMOJI="✅"
          if [ "$STATUS" != "success" ]; then
            EMOJI="❌"
          fi

          curl -sf -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "service": "${{ inputs.service }}",
              "status": "'"$STATUS"'",
              "commit": "${{ github.sha }}",
              "actor": "${{ github.actor }}",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "text": "'"$EMOJI"' Deploy **${{ inputs.service }}** — '"$STATUS"' ('"${{ github.sha }}"')"
            }' || echo "Warning: webhook notification failed (non-blocking)"
