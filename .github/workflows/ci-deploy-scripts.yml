name: CI – Deploy Scripts

on:
  push:
    branches: [main]
    paths:
      - 'scripts/deploy.sh'
      - 'scripts/_common.sh'
      - 'scripts/agentbox.sh'
      - 'scripts/agentbox-compose-gen.py'
      - 'scripts/backup.sh'
      - 'scripts/rollback.sh'
      - 'tests/scripts/deploy.bats'
      - 'tests/scripts/backup.bats'
      - 'tests/scripts/rollback.bats'
      - 'deploy/compose/prod/docker-compose.*.yml'
      - 'scripts/checks/*.py'
  pull_request:
    paths:
      - 'scripts/deploy.sh'
      - 'scripts/_common.sh'
      - 'scripts/agentbox.sh'
      - 'scripts/agentbox-compose-gen.py'
      - 'scripts/backup.sh'
      - 'scripts/rollback.sh'
      - 'tests/scripts/deploy.bats'
      - 'tests/scripts/backup.bats'
      - 'tests/scripts/rollback.bats'
      - 'deploy/compose/prod/docker-compose.*.yml'
      - 'scripts/checks/*.py'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint deploy scripts
        run: shellcheck --severity=warning scripts/deploy.sh scripts/_common.sh scripts/agentbox.sh scripts/backup.sh scripts/rollback.sh

      - name: Run deploy script tests
        run: |
          sudo apt-get install -y bats
          bats tests/scripts/deploy.bats
          bats tests/scripts/backup.bats
          bats tests/scripts/rollback.bats

      - name: Validate all compose files
        run: |
          for f in deploy/compose/prod/docker-compose.*.yml; do
            echo "Validating $f..."
            docker compose -f "$f" config > /dev/null
          done

      - name: Assert deploy safety invariants
        run: |
          echo "Checking: no --remove-orphans..."
          ! grep -- "--remove-orphans" scripts/deploy.sh

          echo "Checking: all docker compose calls use -p..."
          ! (grep "docker compose" scripts/deploy.sh | grep -v "^#" | grep -v "^[[:space:]]*#" | grep -v -- "-p ")

          echo "All safety checks passed."

      - name: Assert compose volume naming
        run: python3 scripts/checks/check_volume_names.py

      - name: Assert no destructive volume commands
        run: |
          echo "Checking: no destructive volume commands in scripts or workflows..."
          FAIL=0
          for f in scripts/*.sh .github/workflows/*.yml; do
            # Strip comment and blank lines, then check for banned patterns
            STRIPPED=$(grep -v '^[[:space:]]*#' "$f" 2>/dev/null | grep -v '^[[:space:]]*$') || true
            if echo "$STRIPPED" | grep -qE 'docker compose.*down.*-v'; then
              echo "FAIL: $f contains 'docker compose down -v'"; FAIL=1
            fi
            if echo "$STRIPPED" | grep -qE 'docker volume rm'; then
              echo "FAIL: $f contains 'docker volume rm'"; FAIL=1
            fi
            if echo "$STRIPPED" | grep -qE 'docker system prune'; then
              echo "FAIL: $f contains 'docker system prune'"; FAIL=1
            fi
          done
          [ "$FAIL" -eq 0 ] && echo "No destructive volume commands found."
          exit $FAIL
